<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SinalTech - Sinais</title>
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        darkMode: "class",
      };
      document.documentElement.classList.remove("dark");
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      select {
        color-scheme: light;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#f5f7fb] text-slate-950 transition-colors dark:bg-slate-950 dark:text-slate-100">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-4 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-4 py-3 sm:flex-row sm:items-center sm:justify-between">
        <div class="min-w-0">
          <p class="text-xs font-bold uppercase tracking-[0.18em] text-cyan-700 dark:text-cyan-300">SinalTech</p>
          <h1 id="schoolName" class="mt-1 truncate text-2xl font-black tracking-tight sm:text-3xl">
            Carregando escola...
          </h1>
          <p id="playerStatus" class="mt-1 text-sm text-slate-500 dark:text-slate-400">Buscando horarios publicados.</p>
        </div>
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
          <button
            id="enableAudioBtn"
            type="button"
            class="inline-flex min-h-12 shrink-0 items-center justify-center gap-2 rounded-xl bg-slate-950 px-4 py-2 text-sm font-bold text-white shadow-sm transition hover:bg-slate-800 dark:bg-cyan-500 dark:text-slate-950 dark:hover:bg-cyan-400"
          >
            <i class="fas fa-volume-high"></i>
            Ativar som
          </button>
        </div>
      </header>

      <section class="grid gap-4 py-4 lg:grid-cols-[minmax(0,1fr)_380px]">
        <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-colors dark:border-slate-800 dark:bg-slate-900 sm:p-6">
          <div class="grid gap-5 md:grid-cols-[220px_minmax(0,1fr)] md:items-center">
            <div>
              <p id="todayDate" class="text-sm font-semibold text-slate-500 dark:text-slate-400">--</p>
              <p id="clock" class="mt-2 text-6xl font-black leading-none tracking-tight tabular-nums sm:text-7xl">
                --:--
              </p>
            </div>

            <div class="rounded-2xl bg-slate-950 p-4 text-white">
              <div class="flex items-center justify-between gap-3">
                <p class="text-xs font-bold uppercase tracking-[0.18em] text-cyan-300">Proximo sinal</p>
                <span id="signalCount" class="rounded-full bg-white/10 px-2 py-1 text-xs font-bold text-slate-200">
                  --
                </span>
              </div>
              <p id="nextSignal" class="mt-3 text-2xl font-black leading-tight">--</p>
              <p id="scheduledStatus" class="mt-2 text-sm text-slate-300">Aguardando horarios.</p>
            </div>
          </div>
        </div>

        <aside class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-colors dark:border-slate-800 dark:bg-slate-900 sm:p-6">
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">Audio</p>
              <p id="playingSignal" class="mt-1 text-xl font-black">Nenhum</p>
            </div>
            <span
              id="audioBadge"
              class="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-600"
            >
              Desativado
            </span>
          </div>
          <p id="audioHint" class="mt-4 text-sm leading-6 text-slate-500 dark:text-slate-400">
            Ative o som para permitir a reproducao automatica neste aparelho.
          </p>
        </aside>
      </section>

      <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-colors dark:border-slate-800 dark:bg-slate-900 sm:p-5">
        <div class="grid gap-3 md:grid-cols-[minmax(0,1fr)_160px] md:items-end">
          <label class="block">
            <span class="mb-2 block text-sm font-bold text-slate-700 dark:text-slate-300">Selecionar musica</span>
            <select
              id="manualSignalSelect"
              class="min-h-12 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-base font-semibold text-slate-900 outline-none transition focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100 dark:focus:ring-cyan-950"
            >
              <option value="">Selecione uma musica</option>
            </select>
          </label>
          <button
            id="manualPlayBtn"
            type="button"
            class="inline-flex min-h-12 items-center justify-center gap-2 rounded-xl bg-cyan-600 px-4 py-2 text-sm font-bold text-white transition hover:bg-cyan-700 disabled:cursor-not-allowed disabled:bg-slate-200 disabled:text-slate-500"
            disabled
          >
            <i class="fas fa-play"></i>
            Tocar
          </button>
        </div>
        <p id="audioCount" class="mt-3 text-sm text-slate-500 dark:text-slate-400">Carregando musicas cadastradas.</p>
      </section>

      <section class="mt-4 flex items-center justify-between gap-3">
        <h2 class="text-lg font-black tracking-tight">Horarios publicados</h2>
        <span class="rounded-full bg-white px-3 py-1 text-xs font-bold text-slate-500 shadow-sm dark:bg-slate-900 dark:text-slate-400">
          Somente leitura
        </span>
      </section>

      <section id="scheduleSections" class="grid flex-1 gap-4 py-4 lg:grid-cols-3"></section>
    </main>

    <script src="/config/js/public-player.js"></script>
  </body>
</html>
